<script>
   
    var xhr = new XMLHttpRequest();
    xhr.open("POST", "/processor_read");
    xhr.onload = () => {

      if (xhr.readyState === xhr.DONE) {
        if (xhr.status === 200) {

          const searchParams = new URLSearchParams(xhr.responseText);


          for (const p of searchParams) {
            
            document.getElementsByName(p[0])[0].value = p[1];
          }

        }
      }
      
    }

    var form = document.querySelector('form');
    var data = new FormData(form);


    xhr.send(data);

    //convert FormData to Object
    var serializeFormToObject = function (form) {
      var objForm = {};
      var formData = new FormData(form);
      for (var key of formData.keys()) {
        objForm[key] = formData.get(key);
        console.log(key + "=" + formData.get(key) + "&");
      }
      return objForm;
    };

    document.addEventListener('submit', function (event) {
      event.preventDefault();
      var xhr = new XMLHttpRequest();
      xhr.open("POST", "/processor_write");
      
      xhr.onload = () => {
        if (xhr.readyState === xhr.DONE) {
          if (xhr.status === 200) {

            if(xhr.responseText=="success"){
              alert("Başarıyla Kaydedildi");
            }
          }
        }     
      }
      var form = document.querySelector('form');
      var data = new FormData(form);
      xhr.send(data);
      
    });


  
</script>
